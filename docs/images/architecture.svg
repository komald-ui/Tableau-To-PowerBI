    <g transform="translate(16, 110)">
      <rect width="232" height="48" rx="6" fill="rgba(233,118,39,0.06)" stroke="rgba(233,118,39,0.15)" stroke-width="0.6"/>
      <text x="12" y="22" font-family="Consolas, monospace" font-size="10" fill="#E97627">dax_converter.py</text>
      <text x="12" y="38" font-family="Segoe UI, sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">180+ formula conversions</text>
    </g>
