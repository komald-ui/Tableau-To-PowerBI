      <text x="12" y="22" font-family="Consolas, monospace" font-size="10" fill="#E97627">prep_flow_parser.py</text>
      <text x="12" y="38" font-family="Segoe UI, sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">Tableau Prep flows → M</text>
