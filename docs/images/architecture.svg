    <text x="260" y="381" font-family="Segoe UI, sans-serif" font-size="10" fill="#0078D4" text-anchor="middle">🚀  deploy/  —  Fabric REST · PBI Service · Bundle · Multi-tenant · Blue/Green</text>
  </g>

  <!-- Bottom accent -->
  <rect y="514" width="1200" height="6" fill="url(#a-accent)" opacity="0.4"/>
</svg>
