      <text x="12" y="22" font-family="Consolas, monospace" font-size="10" fill="#8764B8">shared_model.py</text>
      <text x="12" y="38" font-family="Segoe UI, sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">Multi-workbook merge</text>
    </g>
    <g transform="translate(262, 170)">
      <rect width="242" height="48" rx="6" fill="rgba(135,100,184,0.08)" stroke="rgba(135,100,184,0.15)" stroke-width="0.6"/>
      <text x="12" y="22" font-family="Consolas, monospace" font-size="10" fill="#8764B8">fabric_project_generator.py</text>
      <text x="12" y="38" font-family="Segoe UI, sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">Fabric-native output</text>
    </g>

    <!-- Assessment -->
    <g transform="translate(16, 230)">
      <rect width="232" height="48" rx="6" fill="rgba(3,131,135,0.08)" stroke="rgba(3,131,135,0.15)" stroke-width="0.6"/>
      <text x="12" y="22" font-family="Consolas, monospace" font-size="10" fill="#038387">assessment.py</text>
      <text x="12" y="38" font-family="Segoe UI, sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">Readiness scoring · 9 axes</text>
    </g>
    <g transform="translate(262, 230)">
      <rect width="242" height="48" rx="6" fill="rgba(3,131,135,0.08)" stroke="rgba(3,131,135,0.15)" stroke-width="0.6"/>
      <text x="12" y="22" font-family="Consolas, monospace" font-size="10" fill="#038387">validator.py</text>
      <text x="12" y="38" font-family="Segoe UI, sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">JSON · TMDL · structure</text>
    </g>

    <!-- Outputs -->
    <rect x="16" y="300" width="234" height="46" rx="6" fill="rgba(0,120,212,0.06)" stroke="rgba(0,120,212,0.2)" stroke-width="0.8"/>
    <text x="133" y="320" font-family="Segoe UI, sans-serif" font-size="10" font-weight="bold" fill="#0078D4" text-anchor="middle">.pbip Project</text>
    <text x="133" y="336" font-family="Segoe UI, sans-serif" font-size="9" fill="rgba(255,255,255,0.35)" text-anchor="middle">PBIR + TMDL + M Queries</text>

    <rect x="270" y="300" width="234" height="46" rx="6" fill="rgba(135,100,184,0.06)" stroke="rgba(135,100,184,0.2)" stroke-width="0.8"/>
    <text x="387" y="320" font-family="Segoe UI, sans-serif" font-size="10" font-weight="bold" fill="#8764B8" text-anchor="middle">Fabric Native</text>
    <text x="387" y="336" font-family="Segoe UI, sans-serif" font-size="9" fill="rgba(255,255,255,0.35)" text-anchor="middle">Lakehouse + Dataflow + Notebook</text>

    <!-- Deploy -->
