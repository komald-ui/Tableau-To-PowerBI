      <text x="12" y="22" font-family="Consolas, monospace" font-size="10" fill="#E97627">server_client.py</text>
      <text x="12" y="38" font-family="Segoe UI, sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">Tableau Server REST API</text>
    </g>
    <g transform="translate(262, 230)">
      <rect width="242" height="48" rx="6" fill="rgba(233,118,39,0.06)" stroke="rgba(233,118,39,0.15)" stroke-width="0.6"/>
      <text x="12" y="22" font-family="Consolas, monospace" font-size="10" fill="#E97627">pulse_extractor.py</text>
      <text x="12" y="38" font-family="Segoe UI, sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">Tableau Pulse metrics</text>
