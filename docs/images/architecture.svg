    <text x="260" y="26" font-family="Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#E97627" text-anchor="middle">📦  EXTRACTION  (tableau_export/)</text>

    <!-- Modules -->
    <g transform="translate(16, 50)">
      <rect width="232" height="48" rx="6" fill="rgba(233,118,39,0.06)" stroke="rgba(233,118,39,0.15)" stroke-width="0.6"/>
      <text x="12" y="22" font-family="Consolas, monospace" font-size="10" fill="#E97627">extract_tableau_data.py</text>
      <text x="12" y="38" font-family="Segoe UI, sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">Main parser · 23 object types</text>
    </g>
    <g transform="translate(262, 50)">
      <rect width="242" height="48" rx="6" fill="rgba(233,118,39,0.06)" stroke="rgba(233,118,39,0.15)" stroke-width="0.6"/>
      <text x="12" y="22" font-family="Consolas, monospace" font-size="10" fill="#E97627">datasource_extractor.py</text>
      <text x="12" y="38" font-family="Segoe UI, sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">Tables · Columns · Relations</text>
