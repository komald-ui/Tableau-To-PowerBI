  <rect width="1200" height="520" rx="12" fill="url(#a-bg)"/>

  <!-- Particles -->
  <circle cx="80" cy="40" r="1" fill="rgba(255,255,255,0.08)"/>
  <circle cx="200" cy="480" r="0.8" fill="rgba(255,255,255,0.06)"/>
  <circle cx="400" cy="30" r="1.2" fill="rgba(255,255,255,0.1)"/>
  <circle cx="600" cy="500" r="0.7" fill="rgba(255,255,255,0.07)"/>
  <circle cx="800" cy="25" r="0.9" fill="rgba(255,255,255,0.08)"/>
  <circle cx="1000" cy="490" r="1" fill="rgba(255,255,255,0.06)"/>
  <circle cx="1150" cy="50" r="0.6" fill="rgba(255,255,255,0.09)"/>

  <!-- Title -->
  <text x="600" y="38" font-family="Segoe UI, sans-serif" font-size="16" font-weight="700" fill="#F2C811" text-anchor="middle" letter-spacing="3">SYSTEM ARCHITECTURE</text>
  <rect x="200" y="48" width="800" height="1" fill="url(#a-accent)" opacity="0.3"/>

