      <rect width="232" height="48" rx="6" fill="rgba(0,120,212,0.06)" stroke="rgba(0,120,212,0.15)" stroke-width="0.6"/>
      <text x="12" y="22" font-family="Consolas, monospace" font-size="10" fill="#0078D4">visual_generator.py</text>
      <text x="12" y="38" font-family="Segoe UI, sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">190 visual types</text>
