<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" width="1200" height="520">
  <defs>
    <linearGradient id="a-bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0A0E27"/>
      <stop offset="100%" stop-color="#122550"/>
    </linearGradient>
    <linearGradient id="a-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.07)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.015)"/>
    </linearGradient>
    <linearGradient id="a-border" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.14)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.03)"/>
    </linearGradient>
    <linearGradient id="a-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E97627"/>
      <stop offset="50%" stop-color="#F2C811"/>
      <stop offset="100%" stop-color="#0078D4"/>
    </linearGradient>
    <linearGradient id="a-flow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F2C811" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#F2C811" stop-opacity="0"/>
    </linearGradient>
    <filter id="a-glow"><feGaussianBlur in="SourceGraphic" stdDeviation="4"/></filter>
    <radialGradient id="a-orb-tab" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E97627" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#E97627" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="a-orb-gen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0078D4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0078D4" stop-opacity="0"/>
    </radialGradient>
