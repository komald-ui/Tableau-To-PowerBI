<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0A0E27"/>
      <stop offset="40%" stop-color="#0D1B3E"/>
      <stop offset="100%" stop-color="#122550"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E97627"/>
      <stop offset="40%" stop-color="#F2C811"/>
      <stop offset="70%" stop-color="#60B5FF"/>
      <stop offset="100%" stop-color="#0078D4"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#B0D4F1"/>
    </linearGradient>
    <radialGradient id="orb-orange" cx="0.35" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="#FFBE76"/>
      <stop offset="50%" stop-color="#E97627"/>
      <stop offset="100%" stop-color="#C05621"/>
    </radialGradient>
    <radialGradient id="orb-yellow" cx="0.35" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="#FFF3B0"/>
      <stop offset="50%" stop-color="#F2C811"/>
      <stop offset="100%" stop-color="#D4A800"/>
    </radialGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.03)"/>
    </linearGradient>
    <linearGradient id="glass-b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
    </linearGradient>
    <filter id="glow-o"><feGaussianBlur in="SourceGraphic" stdDeviation="12"/></filter>
    <filter id="glow-y"><feGaussianBlur in="SourceGraphic" stdDeviation="12"/></filter>
    <filter id="blur-s"><feGaussianBlur in="SourceGraphic" stdDeviation="50"/></filter>
    <filter id="ico-sh"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/></filter>
    <filter id="t-glow"><feGaussianBlur in="SourceGraphic" stdDeviation="3"/></filter>
  </defs>

  <!-- Deep background -->
  <rect width="1200" height="340" fill="url(#bg)"/>

  <!-- Ambient light orbs -->
  <ellipse cx="120" cy="170" rx="250" ry="200" fill="#E97627" opacity="0.04" filter="url(#blur-s)"/>
  <ellipse cx="1080" cy="170" rx="280" ry="220" fill="#0078D4" opacity="0.06" filter="url(#blur-s)"/>
  <ellipse cx="550" cy="50" rx="300" ry="120" fill="#F2C811" opacity="0.025" filter="url(#blur-s)"/>
  <ellipse cx="700" cy="300" rx="200" ry="100" fill="#60B5FF" opacity="0.03" filter="url(#blur-s)"/>

  <!-- Subtle grid -->
  <g opacity="0.025" stroke="white" stroke-width="0.5">
    <line x1="0" y1="68" x2="1200" y2="68"/><line x1="0" y1="136" x2="1200" y2="136"/>
    <line x1="0" y1="204" x2="1200" y2="204"/><line x1="0" y1="272" x2="1200" y2="272"/>
    <line x1="240" y1="0" x2="240" y2="340"/><line x1="480" y1="0" x2="480" y2="340"/>
    <line x1="720" y1="0" x2="720" y2="340"/><line x1="960" y1="0" x2="960" y2="340"/>
  </g>

  <!-- Floating particles -->
  <circle cx="180" cy="60" r="1.5" fill="#F2C811" opacity="0.4"/>
  <circle cx="340" cy="280" r="1" fill="#60B5FF" opacity="0.3"/>
  <circle cx="520" cy="40" r="1.2" fill="#E97627" opacity="0.35"/>
  <circle cx="750" cy="300" r="1.5" fill="#F2C811" opacity="0.25"/>
  <circle cx="900" cy="55" r="1" fill="#60B5FF" opacity="0.4"/>
  <circle cx="1050" cy="290" r="1.3" fill="#E97627" opacity="0.3"/>
  <circle cx="420" cy="310" r="0.8" fill="white" opacity="0.2"/>
  <circle cx="1120" cy="80" r="1" fill="#F2C811" opacity="0.3"/>
  <circle cx="80" cy="290" r="1.2" fill="#60B5FF" opacity="0.25"/>
  <circle cx="650" cy="25" r="0.8" fill="white" opacity="0.15"/>
  <circle cx="1000" cy="160" r="1" fill="#F2C811" opacity="0.2"/>

  <!-- Tableau orb + glow -->
  <circle cx="130" cy="135" r="52" fill="#E97627" opacity="0.2" filter="url(#glow-o)"/>
  <circle cx="130" cy="135" r="48" fill="url(#orb-orange)" filter="url(#ico-sh)"/>
  <ellipse cx="118" cy="118" rx="20" ry="12" fill="white" opacity="0.2" transform="rotate(-30 118 118)"/>
  <text x="130" y="153" font-family="Segoe UI, Arial, sans-serif" font-size="50" font-weight="bold" fill="white" text-anchor="middle">T</text>

  <!-- Arrow flow with glow dots -->
  <circle cx="210" cy="135" r="3.5" fill="#F2C811" opacity="0.5"/>
  <circle cx="210" cy="135" r="6" fill="#F2C811" opacity="0.1"/>
  <circle cx="235" cy="135" r="4.5" fill="#F2C811" opacity="0.6"/>
  <circle cx="235" cy="135" r="8" fill="#F2C811" opacity="0.1"/>
  <circle cx="264" cy="135" r="5.5" fill="#F2C811" opacity="0.7"/>
  <circle cx="264" cy="135" r="10" fill="#F2C811" opacity="0.1"/>
  <polygon points="286,122 316,135 286,148" fill="#F2C811" opacity="0.9"/>
  <polygon points="286,122 316,135 286,148" fill="#F2C811" opacity="0.15" filter="url(#glow-y)"/>

  <!-- Power BI orb + glow -->
  <circle cx="365" cy="135" r="52" fill="#F2C811" opacity="0.15" filter="url(#glow-y)"/>
  <circle cx="365" cy="135" r="48" fill="url(#orb-yellow)" filter="url(#ico-sh)"/>
  <ellipse cx="353" cy="118" rx="20" ry="12" fill="white" opacity="0.25" transform="rotate(-30 353 118)"/>
  <text x="365" y="149" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="bold" fill="#1A1A2E" text-anchor="middle">PBI</text>

  <!-- Title with backlight glow -->
  <text x="475" y="105" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="bold" fill="#60B5FF" opacity="0.12" filter="url(#t-glow)">Tableau → Power BI</text>
  <text x="475" y="105" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="bold" fill="url(#title-grad)">Tableau → Power BI</text>
  <text x="475" y="148" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="600" fill="#F2C811">Automated Migration Tool</text>
  <text x="475" y="178" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.55)">Migrate workbooks to .pbip in seconds — fully automated, zero manual rework</text>

  <!-- Glass stat cards -->
  <g transform="translate(475, 200)">
    <g><rect width="112" height="56" rx="10" fill="url(#glass)" stroke="url(#glass-b)" stroke-width="1"/><text x="56" y="24" font-family="Segoe UI, sans-serif" font-size="19" font-weight="bold" fill="#F2C811" text-anchor="middle">180+</text><text x="56" y="43" font-family="Segoe UI, sans-serif" font-size="10" fill="rgba(255,255,255,0.55)" text-anchor="middle">DAX Conversions</text></g>
    <g transform="translate(122,0)"><rect width="112" height="56" rx="10" fill="url(#glass)" stroke="url(#glass-b)" stroke-width="1"/><text x="56" y="24" font-family="Segoe UI, sans-serif" font-size="19" font-weight="bold" fill="#F2C811" text-anchor="middle">118+</text><text x="56" y="43" font-family="Segoe UI, sans-serif" font-size="10" fill="rgba(255,255,255,0.55)" text-anchor="middle">Visual Types</text></g>
    <g transform="translate(244,0)"><rect width="112" height="56" rx="10" fill="url(#glass)" stroke="url(#glass-b)" stroke-width="1"/><text x="56" y="24" font-family="Segoe UI, sans-serif" font-size="19" font-weight="bold" fill="#F2C811" text-anchor="middle">42</text><text x="56" y="43" font-family="Segoe UI, sans-serif" font-size="10" fill="rgba(255,255,255,0.55)" text-anchor="middle">Connectors</text></g>
    <g transform="translate(366,0)"><rect width="112" height="56" rx="10" fill="url(#glass)" stroke="url(#glass-b)" stroke-width="1"/><text x="56" y="24" font-family="Segoe UI, sans-serif" font-size="19" font-weight="bold" fill="#F2C811" text-anchor="middle">6,818+</text><text x="56" y="43" font-family="Segoe UI, sans-serif" font-size="10" fill="rgba(255,255,255,0.55)" text-anchor="middle">Tests Passing</text></g>
    <g transform="translate(488,0)"><rect width="112" height="56" rx="10" fill="rgba(16,124,16,0.15)" stroke="rgba(74,222,128,0.3)" stroke-width="1"/><text x="56" y="24" font-family="Segoe UI, sans-serif" font-size="19" font-weight="bold" fill="#4ADE80" text-anchor="middle">100%</text><text x="56" y="43" font-family="Segoe UI, sans-serif" font-size="10" fill="rgba(255,255,255,0.55)" text-anchor="middle">Fidelity</text></g>
  </g>

  <!-- Terminal prompt — glass with traffic lights -->
  <rect x="475" y="274" width="400" height="32" rx="8" fill="url(#glass)" stroke="url(#glass-b)" stroke-width="1"/>
  <circle cx="490" cy="290" r="4" fill="#FF5F56" opacity="0.7"/>
  <circle cx="502" cy="290" r="4" fill="#FFBD2E" opacity="0.7"/>
  <circle cx="514" cy="290" r="4" fill="#27C93F" opacity="0.7"/>
  <text x="530" y="295" font-family="Cascadia Code, Consolas, monospace" font-size="13" fill="rgba(255,255,255,0.4)">$</text>
  <text x="545" y="295" font-family="Cascadia Code, Consolas, monospace" font-size="13" fill="#4ADE80">python migrate.py workbook.twbx</text>

  <!-- Version pill -->
  <rect x="1078" y="286" width="102" height="26" rx="13" fill="url(#glass)" stroke="url(#glass-b)" stroke-width="1"/>
  <text x="1129" y="304" font-family="Segoe UI, sans-serif" font-size="12" fill="rgba(255,255,255,0.5)" text-anchor="middle">v38.1.0</text>

  <!-- Left pills -->
  <rect x="52" y="212" width="140" height="30" rx="15" fill="url(#glass)" stroke="rgba(233,118,39,0.3)" stroke-width="1"/>
  <circle cx="72" cy="227" r="5" fill="#E97627" opacity="0.6"/>
  <text x="132" y="232" font-family="Segoe UI, sans-serif" font-size="12" fill="rgba(233,118,39,0.85)" text-anchor="middle">Zero Dependencies</text>

  <rect x="52" y="250" width="140" height="30" rx="15" fill="url(#glass)" stroke="rgba(96,181,255,0.3)" stroke-width="1"/>
  <circle cx="72" cy="265" r="5" fill="#60B5FF" opacity="0.6"/>
  <text x="132" y="270" font-family="Segoe UI, sans-serif" font-size="12" fill="rgba(96,181,255,0.85)" text-anchor="middle">Python 3.12+</text>

  <!-- Bottom accent bar with glow -->
  <rect x="0" y="332" width="1200" height="8" fill="url(#accent)"/>
  <rect x="0" y="332" width="1200" height="4" fill="url(#accent)" opacity="0.4" filter="url(#t-glow)"/>
</svg>
